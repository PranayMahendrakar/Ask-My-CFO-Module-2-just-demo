name: Ask My CFO — Financial Extraction Pipeline

on:
  workflow_dispatch:
      inputs:
            run_id:
                    description: 'Unique run ID'
                            required: true
                                    type: string
                                          company_name:
                                                  description: 'Company name'
                                                          required: false
                                                                  default: 'Unknown Company'
                                                                          type: string
                                                                                fiscal_year:
                                                                                        description: 'Fiscal Year'
                                                                                                required: false
                                                                                                        default: 'FY2022-23'
                                                                                                                type: string
                                                                                                                
                                                                                                                jobs:
                                                                                                                  extract:
                                                                                                                      runs-on: ubuntu-latest
                                                                                                                          permissions:
                                                                                                                                contents: write
                                                                                                                                
                                                                                                                                    steps:
                                                                                                                                          - name: Checkout repository
                                                                                                                                                  uses: actions/checkout@v4
                                                                                                                                                          with:
                                                                                                                                                                    fetch-depth: 0
                                                                                                                                                                    
                                                                                                                                                                          - name: Set up Python 3.11
                                                                                                                                                                                  uses: actions/setup-python@v5
                                                                                                                                                                                          with:
                                                                                                                                                                                                    python-version: '3.11'
                                                                                                                                                                                                    
                                                                                                                                                                                                          - name: Cache pip
                                                                                                                                                                                                                  uses: actions/cache@v4
                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                    path: ~/.cache/pip
                                                                                                                                                                                                                                              key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                    - name: Install dependencies
                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                      pip install --upgrade pip
                                                                                                                                                                                                                                                                                pip install -r requirements.txt
                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                      - name: Locate uploaded files
                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                        echo "Run ID: ${{ github.event.inputs.run_id }}"
                                                                                                                                                                                                                                                                                                                  PDF=$(find uploads/ -name "${{ github.event.inputs.run_id }}_report.pdf" 2>/dev/null | head -1)
                                                                                                                                                                                                                                                                                                                            TMPL=$(find uploads/ -name "${{ github.event.inputs.run_id }}_template.xlsx" 2>/dev/null | head -1)
                                                                                                                                                                                                                                                                                                                                      [ -z "$PDF" ] && { echo "ERROR: PDF not found"; exit 1; }
                                                                                                                                                                                                                                                                                                                                                [ -z "$TMPL" ] && TMPL="Input_Templates.xlsx"
                                                                                                                                                                                                                                                                                                                                                          echo "PDF_FILE=$PDF" >> $GITHUB_ENV
                                                                                                                                                                                                                                                                                                                                                                    echo "TMPL_FILE=$TMPL" >> $GITHUB_ENV
                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                          - name: Run 3-Layer Extraction Pipeline
                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                            mkdir -p outputs
                                                                                                                                                                                                                                                                                                                                                                                                      OUT="outputs/${{ github.event.inputs.run_id }}_output.xlsx"
                                                                                                                                                                                                                                                                                                                                                                                                                python pipeline.py "$PDF_FILE" "$TMPL_FILE" "$OUT" \
                                                                                                                                                                                                                                                                                                                                                                                                                            "${{ github.event.inputs.company_name }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                        "${{ github.event.inputs.fiscal_year }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                    2>&1 | tee outputs/${{ github.event.inputs.run_id }}_pipeline.log
                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "OUTPUT_FILE=$OUT" >> $GITHUB_ENV
                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Write status JSON
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    shell: python
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      import json, os
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run_id = "${{ github.event.inputs.run_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          log_path = f"outputs/{run_id}_pipeline.log"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  log = open(log_path).read()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                status = "error" if ("ERROR" in log or "Traceback" in log) else "success"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          except Exception:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        log, status = "", "error"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  obj = {"run_id": run_id, "status": status,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   "output_file": f"outputs/{run_id}_output.xlsx",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    "log": log[-4000:]}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              open(f"outputs/{run_id}_status.json", "w").write(json.dumps(obj, indent=2))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(json.dumps(obj, indent=2))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Commit outputs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git config user.name "Ask-My-CFO-Bot"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git config user.email "bot@askmycfo.ai"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git add outputs/
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git diff --cached --quiet || git commit -m "ci: output for ${{ github.event.inputs.run_id }} [skip ci]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          name: extraction-${{ github.event.inputs.run_id }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    path: outputs/${{ github.event.inputs.run_id }}_*
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              retention-days: 30
